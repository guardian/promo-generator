name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    permissions:
      id-token: write
      contents: read
      checks: write
      issues: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 23
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies (CDK)
        working-directory: ./cdk
        run: npm ci
      - name: Test (CDK)
        working-directory: ./cdk
        run: npm test
      - name: Synthesize (CDK)
        working-directory: ./cdk
        run: npm run synth

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

    #   - name: Zip build output
    #     working-directory: ./dist
    #     run: zip -r ../build.zip .

      - uses: guardian/actions-riff-raff@v4
        with:
          app: promo-generator
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          configPath: riff-raff.yaml
          projectName: "playground::promo-generator"
          contentDirectories: |
            cdk:
              - cdk/cdk.out
            promo-generator:
              - dist/